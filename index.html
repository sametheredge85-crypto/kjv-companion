<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJV Harmony</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f1ea;
  color: #2c2c2c;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
}

.hero h1 {
  font-size: 34px;
  font-weight: 500;
  margin-bottom: 10px;
}

.hero p {
  font-size: 16px;
  color: #7a6a55;
}

.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 26px;
  background: linear-gradient(135deg, #b8965a, #8c6b2f);
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 16px;
}

/* TOOL */
.tool {
  margin-top: 40px;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border: none;
  background: #8c6b2f;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}

/* RESULT */
.result {
  margin-top: 20px;
}

.section {
  margin-top: 16px;
}

.section h3 {
  margin-bottom: 5px;
  color: #8c6b2f;
  font-size: 14px;
  letter-spacing: 1px;
}

.section p {
  margin: 0;
  font-size: 15px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 50px;
  font-size: 12px;
  color: #999;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h1>KJV Harmony</h1>
  <p>Line upon line • Precept upon precept</p>
  <a href="#tool" class="btn">Start Harmony</a>
</div>

<!-- TOOL -->
<div id="tool" class="tool">
  <input id="input" placeholder="Enter verse or question (John 3:16)">
  <button onclick="runHarmony()">Get Harmony</button>

  <div id="output" class="result" style="display:none;">

    <div class="section">
      <h3>TITLE</h3>
      <p id="title"></p>
    </div>

    <div class="section">
      <h3>SHORT ANSWER</h3>
      <p id="short"></p>
    </div>

    <div class="section">
      <h3>CONTEXT</h3>
      <p id="context"></p>
    </div>

    <div class="section">
      <h3>HARMONY</h3>
      <p id="harmony"></p>
    </div>

    <div class="section">
      <h3>APPLICATION</h3>
      <p id="application"></p>
    </div>

  </div>
</div>

<div class="footer">
  KJV • Whole Counsel • Scripture Cannot Be Broken
</div>

</div>

<script>
function runHarmony() {
  const input = document.getElementById("input").value.trim();

  if (!input) return;

  document.getElementById("output").style.display = "block";

  // BASIC verse detection (simple)
  const isVerse = input.match(/\b\d+:\d+\b/);

  // Core doctrinal anchors (your framework)
  const anchors = [
    "God is the acting subject in salvation.",
    "Life precedes response — the dead cannot hear.",
    "God must open the heart, eyes, and ears first.",
    "Context determines scope — not assumption.",
    "Scripture interprets Scripture.",
    "The work of God is finished and settled."
  ];

  // TITLE
  document.getElementById("title").innerText =
    isVerse ? "KJV Harmony — " + input : "KJV Harmony Inquiry";

  // SHORT ANSWER
  document.getElementById("short").innerText =
    "The truth is revealed by God through His word, not produced by man's effort.";

  // CONTEXT
  document.getElementById("context").innerText =
    isVerse
      ? "This verse must be understood in its immediate setting, the chapter flow, and the full counsel of God."
      : "The question must be examined by the whole counsel of God, not isolated reasoning.";

  // HARMONY (anchors applied)
  document.getElementById("harmony").innerText =
    anchors.join(" • ");

  // APPLICATION
  document.getElementById("application").innerText =
    "Seek the Lord in His word. Wait upon Him to open understanding. Truth is received, not constructed.";

}
</script>

</body>
</html>
